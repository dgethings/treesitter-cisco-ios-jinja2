name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generate:
    name: Generate + src-drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - run: npx tree-sitter generate
      - run: git diff --exit-code src/
      - run: npx tree-sitter test

  node-binding:
    name: Node binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - run: npm test

  python-binding:
    name: Python binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: pip install pytest tree-sitter
      - run: pytest bindings/python/tests

  go-binding:
    name: Go binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - run: go test ./bindings/go
